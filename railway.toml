[build]
buildCommand = "if [ -d server ]; then npm ci --prefix server; else npm ci; fi"
watchPatterns = ["server/**"]

[deploy]
startCommand = "if [ -d server ]; then npm start --prefix server; else npm start; fi"
healthcheckPath = "/api/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
